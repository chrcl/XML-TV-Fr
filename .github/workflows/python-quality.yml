name: Python Quality

on:
  push:
    paths:
      - 'python/**'
      - '.github/workflows/python-quality.yml'
  pull_request:
    paths:
      - 'python/**'
      - '.github/workflows/python-quality.yml'

jobs:
  quality:
    name: Lint, Format, Type-check, and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for Python source files
        id: check_python
        run: |
          if find python/ -name '*.py' -not -path '*/\.*' | grep -q .; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
            echo "No Python source files found yet — skipping quality checks."
          fi

      - name: Install dependencies
        if: steps.check_python.outputs.has_python == 'true'
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install ".[dev]"
          else
            pip install ruff black mypy pytest
          fi

      - name: Ruff lint
        if: steps.check_python.outputs.has_python == 'true'
        working-directory: python
        run: ruff check .

      - name: Black format check
        if: steps.check_python.outputs.has_python == 'true'
        working-directory: python
        run: black --check .

      - name: Mypy type checking
        if: steps.check_python.outputs.has_python == 'true'
        working-directory: python
        run: mypy .

      - name: Pytest
        if: steps.check_python.outputs.has_python == 'true'
        working-directory: python
        run: pytest tests/ -v
